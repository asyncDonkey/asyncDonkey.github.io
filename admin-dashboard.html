<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - asyncDonkey.io</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
    <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
    <style>
        #adminDashboardContent { display: none; } /* Nascosto di default, mostrato da JS se admin */
        .admin-section { margin-bottom: 30px; }
        .article-list-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .article-list-item .actions button { margin-left: 10px; }
    </style>
</head>
<body>
    <header>
        </header>

    <main>
        <section id="adminAuthMessage" style="text-align:center; padding: 20px;">
            <p>Verifica permessi...</p>
        </section>

        <section id="adminDashboardContent">
            <h1>Admin Dashboard</h1>

            <div class="admin-section" id="pendingArticlesSection">
                <h2>Articoli in Attesa di Revisione</h2>
                <div id="pendingArticlesList">
                    <p>Caricamento articoli...</p>
                </div>
            </div>

            <div class="admin-section" id="editArticleModal" class="modal" style="display:none;">
                <div class="modal-content" style="max-width: 800px;">
                    <span class="close-modal-btn" id="closeEditArticleModalBtn">&times;</span>
                    <h3 id="editArticleModalTitle">Modifica Articolo</h3>
                    <form id="editArticleForm">
                        <input type="hidden" id="editingArticleId">
                        <div><label for="editArticleTitle">Titolo:</label><input type="text" id="editArticleTitle" style="width:100%;"></div>
                        <div><label for="editArticleContent">Contenuto (Markdown):</label><textarea id="editArticleContent" rows="15"></textarea></div>
                        <div><label for="editArticleTags">Tags:</label><input type="text" id="editArticleTags" style="width:100%;"></div>
                        <div><label for="editArticleSnippet">Snippet:</label><textarea id="editArticleSnippet" rows="3" style="width:100%;"></textarea></div>
                        <div><label for="editArticleCoverImageUrl">URL Immagine Copertina:</label><input type="url" id="editArticleCoverImageUrl" style="width:100%;"></div>
                        <div style="margin-top:15px;">
                            <button type="submit" class="game-button">Salva Modifiche Articolo</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="admin-section" id="userIssuesSection">
                <h2>Segnalazioni e Suggerimenti Utenti</h2>
                <div id="issuesFilterControlsAdmin" style="margin-bottom:15px;">
                    <label for="adminFilterIssueType">Filtra per Tipo:</label>
                    <select id="adminFilterIssueType" style="padding: 8px; border-radius: 4px;">
                        <option value="all">Tutti i Tipi</option>
                        <option value="generalFeature">Richiesta Funzionalità Generale</option>
                        <option value="newGameRequest">Suggerimento Nuovo Gioco</option>
                        <option value="gameIssue">Segnalazione Bug/Problema Gioco</option>
                    </select>
                    <label for="adminFilterIssueStatus" style="margin-left:15px;">Filtra per Stato:</label>
                    <select id="adminFilterIssueStatus" style="padding: 8px; border-radius: 4px;">
                        <option value="all">Tutti gli Stati</option>
                        <option value="new">Nuovo</option>
                        <option value="underConsideration">In Considerazione</option>
                        <option value="accepted">Accettato</option>
                        <option value="planned">Pianificato</option>
                        <option value="inProgress">In Corso</option>
                        <option value="completed">Completato</option>
                        <option value="declined">Rifiutato</option>
                    </select>
                    <button id="adminApplyIssueFiltersBtn" class="game-button" style="margin-left:10px; padding: 8px 15px; font-size:0.9em;">Applica Filtri Issues</button>
                </div>
                <div id="adminUserIssuesList">
                    <p>Caricamento segnalazioni utenti...</p>
                </div>
            </div>

            <div class="admin-section" id="publishedArticlesSection">
                <h2>Articoli Pubblicati</h2>
                <div id="publishedArticlesFilterControls" style="margin-bottom:15px;">
                    <input type="text" id="adminSearchPublishedTitle" placeholder="Cerca per titolo..." style="padding: 8px; border-radius: 4px; border: 1px solid var(--border-color-primary);">
                    <button id="adminApplyPublishedFiltersBtn" class="game-button" style="margin-left:10px; padding: 8px 15px; font-size:0.9em;">Cerca</button>
                </div>
                <div id="adminPublishedArticlesList">
                    <p>Caricamento articoli pubblicati...</p>
                </div>
            </div>

            </section>
    </main>

    <footer>
        </footer>

    <script src="js/main.js" type="module"></script>
    <script src="js/adminDashboard.js" type="module"></script>
</body>
</html>
