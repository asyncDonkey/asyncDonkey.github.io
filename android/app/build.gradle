plugins {
    id 'com.android.application'
    id 'com.google.gms.google-services'
}

android {
    namespace "io.asynced.codedash"
    // AGGIORNAMENTO: Impostiamo la versione dell'SDK di compilazione a 35.
    compileSdk 35

    defaultConfig {
        applicationId "io.asynced.codedash"
        minSdkVersion rootProject.ext.minSdkVersion
        // AGGIORNAMENTO: Impostiamo anche la target-sdk a 35 per coerenza.
        targetSdkVersion 35
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        // ... Il tuo blocco signingConfigs rimane invariato ...
        release {
            if (project.hasProperty('MY_STORE_FILE')) {
                storeFile file(MY_STORE_FILE)
                storePassword MY_STORE_PASSWORD
                keyAlias MY_KEY_ALIAS
                keyPassword MY_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        // ... Il tuo blocco buildTypes rimane invariato ...
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // ... Le tue dipendenze rimangono invariate ...
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')

    implementation platform('com.google.firebase:firebase-bom:33.1.1')
    implementation 'com.google.firebase:firebase-analytics'
}

apply from: 'capacitor.build.gradle'