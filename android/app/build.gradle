plugins {
    id 'com.android.application'
    id 'com.google.gms.google-services'
}

android {
    namespace "io.asynced.codedash"
    compileSdk rootProject.ext.compileSdkVersion // Usa la variabile dal rootProject.ext

    defaultConfig {
        applicationId "io.asynced.codedash"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion // Assicurati di usare la variabile dal rootProject.ext
        versionCode 9 // Ho impostato a 1, puoi cambiarlo al valore che desideri.
        versionName "CodeDash! v2.5" // Ho impostato a 1.0, puoi cambiarlo al valore che desideri.
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        release {
            if (project.hasProperty('MY_STORE_FILE')) {
                storeFile file(MY_STORE_FILE)
                storePassword MY_STORE_PASSWORD
                keyAlias MY_KEY_ALIAS
                keyPassword MY_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:${rootProject.ext.androidxAppCompatVersion}"
    implementation "androidx.coordinatorlayout:coordinatorlayout:${rootProject.ext.androidxCoordinatorLayoutVersion}"
    implementation "androidx.core:core-splashscreen:${rootProject.ext.coreSplashScreenVersion}"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:${rootProject.ext.junitVersion}"
    androidTestImplementation "androidx.test.ext:junit:${rootProject.ext.androidxJunitVersion}"
    androidTestImplementation "androidx.test.espresso:espresso-core:${rootProject.ext.androidxEspressoCoreVersion}"
    implementation project(':capacitor-cordova-android-plugins')

    // Firebase BoM - Importante per la compatibilità delle versioni Firebase
    implementation platform('com.google.firebase:firebase-bom:33.1.1') // O una versione più recente (controlla la doc Firebase)
    
    // DIPENDENZE FONDAMENTALI PER AUTENTICAZIONE E SERVIZI GOOGLE PLAY
    implementation 'com.google.firebase:firebase-auth' // Firebase Authentication SDK
    implementation 'com.google.firebase:firebase-analytics' // Hai già questa
    implementation 'com.google.android.gms:play-services-auth:21.2.0' // Per Google Play Services Auth (include le API necessarie per login Google/Telefono)
    
    // Dipendenze per Firebase App Check (se abilitato nel tuo progetto Firebase, altrimenti commentale)
    // Se usi App Check, queste sono essenziali per l'autenticazione telefonica nativa
    // implementation 'com.google.firebase:firebase-appcheck-playintegrity' // Per i nuovi dispositivi
    // implementation 'com.google.firebase:firebase-appcheck-safetynet' // Per i dispositivi più vecchi
}

apply from: 'capacitor.build.gradle'