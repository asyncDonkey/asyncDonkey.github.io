buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // AGGIORNAMENTO: Passiamo a una versione del plugin che supporta l'SDK 35.
        classpath 'com.android.tools.build:gradle:8.10.1'
        classpath 'com.google.gms:google-services:4.4.2'
    }
}

// *** IMPORTANTE: Applica variables.gradle qui, al livello del progetto root. ***
apply from: "$rootDir/variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}