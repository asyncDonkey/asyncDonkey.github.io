<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>asyncDonkey Runner</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 2px solid #0f0;
            display: block;
            /* RE-INSERITE: Proprietà per il rendering nitido dell'ELEMENTO canvas */
            image-rendering: -moz-crisp-edges;         /* Firefox */
            image-rendering: -webkit-crisp-edges;    /* Webkit */
            image-rendering: pixelated;              /* Standard */
            image-rendering: crisp-edges;            /* Standard */
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script src="js/donkeyRunner.js"></script>
</body>
</html>
